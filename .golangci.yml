version: "2"
run:
  modules-download-mode: vendor
linters:
  default: none
  enable:
    - dupl
    - errcheck
    - gocognit
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 150
      tab-width: 4
    revive:
      severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gocognit
          - goconst
          - gocyclo
          - ineffassign
        path: _test\.go
      - linters:
          - revive
        path: _mock_test\.go
      - linters:
          - gocognit
          - gocyclo
          - lll
          - revive
        path: config/configor
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
      - linters:
          - revive
        text: func name will be used as test\.Test.* by other packages
      - linters:
          - govet
        text: (possible misuse of unsafe.Pointer|should have signature)
      - linters:
          - revive
        text: should have a package comment
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
